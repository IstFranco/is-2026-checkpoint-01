services:
  database:
    image: postgres:16-alpine
    container_name: teamboard-db

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: teamboard-backend

    ports:
      - "${BACKEND_PORT}:5000"

    env_file: .env

    depends_on:
      database:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build: ./frontend
    container_name: teamboard-frontend

    ports:
      - "${FRONTEND_PORT}:8080"

    depends_on:
      - backend

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  portainer:
    image: portainer/portainer-ce:latest
    container_name: teamboard-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  pgdata:
  portainer_data:
